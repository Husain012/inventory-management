<div class="min-h-screen bg-gray-100 flex items-center justify-center p-6">
  <div class="bg-white rounded-2xl shadow-lg w-full max-w-lg p-8">

    <!-- Header -->
    <div class="flex items-center gap-3 mb-6">
      <span class="text-3xl">📦</span>
      <h2 class="text-2xl font-bold text-gray-800">
        {{ isEditMode ? 'Edit Product' : 'Add New Product' }}
      </h2>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-5">

      <!-- Name -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Product Name</label>
        <input
          type="text"
          formControlName="name"
          placeholder="e.g. Wireless Mouse"
          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
          [ngClass]="{'border-red-400': form.get('name')?.invalid && form.get('name')?.touched}"
        />
        <span *ngIf="form.get('name')?.invalid && form.get('name')?.touched"
              class="text-red-500 text-xs mt-1 block">
          Product name is required
        </span>
      </div>

      <!-- Category -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Category</label>
        <input
          type="text"
          formControlName="category"
          placeholder="e.g. Electronics"
          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
          [ngClass]="{'border-red-400': form.get('category')?.invalid && form.get('category')?.touched}"
        />
        <span *ngIf="form.get('category')?.invalid && form.get('category')?.touched"
              class="text-red-500 text-xs mt-1 block">
          Category is required
        </span>
      </div>

      <!-- Quantity & Price -->
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Quantity</label>
          <input
            type="number"
            formControlName="quantity"
            placeholder="0"
            min="0"
            class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
          />
        </div>
        <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Low Stock Alert Threshold
        </label>
        <input
          type="number"
          formControlName="lowStockThreshold"
          placeholder="e.g. 5"
          min="0"
          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
        />
        <p class="text-xs text-gray-400 mt-1">
          Alert will show when quantity falls below this number
        </p>
      </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Price (₹)</label>
          <input
            type="number"
            formControlName="price"
            placeholder="0.00"
            step="0.01"
            min="0"
            class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
          />
        </div>
      </div>

      <!-- Buttons -->
      <div class="flex gap-3 pt-2">
        <button
          type="submit"
          [disabled]="form.invalid"
          class="flex-1 bg-blue-600 text-white py-2 rounded-lg font-semibold hover:bg-blue-700 transition disabled:opacity-50 disabled:cursor-not-allowed">
          {{ isEditMode ? 'Update Product' : 'Add Product' }}
        </button>
        <a routerLink="/products"
           class="flex-1 text-center border border-gray-300 text-gray-600 py-2 rounded-lg font-semibold hover:bg-gray-50 transition">
          Cancel
        </a>
      </div>

    </form>
  </div>
</div>
